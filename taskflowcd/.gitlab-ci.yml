image: alpine:3.20

# WORKFLOW RULES
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

# DEFAULT
default:
  interruptible: true
  retry: 1

# STAGES
stages:
  - configure
  - deploy

# PREPARE ANSIBLE PROD
prepare_ansible_prod:
  stage: configure

  before_script:
    - chmod +x scripts/prepare-ansible.sh

  script:
    - ./scripts/prepare-ansible.sh production

  artifacts:
    paths:
      - vault.key
      - devops-key.pem
      - ansible/inventories/production/host_vars/
    expire_in: 2 hours

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# DEPLOY FRONTEND PROD
deploy_frontend:
  stage: deploy

  needs:
    - job: prepare_ansible_prod
      artifacts: true

  environment:
    name: production

  before_script:
    - apk add --no-cache ansible openssh-client
    - chmod +x scripts/deploy-frontend.sh

  script:
    - ./scripts/deploy-frontend.sh production

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# DEPLOY BACKEND PROD
deploy_backend:
  stage: deploy

  needs:
    - job: prepare_ansible_prod
      artifacts: true

  environment:
    name: production

  before_script:
    - apk add --no-cache ansible openssh-client
    - chmod +x scripts/deploy-backend.sh

  script:
    - ./scripts/deploy-backend.sh production

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual